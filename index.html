<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>TaskFlow — Tasks that flow</title>
  <meta name="description" content="A premium, offline-first task manager. Capture, schedule, and finish what matters." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#FAF6EF" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#13110F" media="(prefers-color-scheme: dark)" />
  <meta name="color-scheme" content="light dark" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TaskFlow" />

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="assets/icons/favicon-64.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />

  <!-- Fonts: Fraunces (display serif) + Geist (UI grotesque). Loaded async with preconnect. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..800,0..100,0..1&family=Geist:wght@300;400;500;600;700&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..800,0..100,0..1&family=Geist:wght@300;400;500;600;700&display=swap"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="src/styles/main.css" />

  <!-- Theme bootstrap: avoid flash by setting data-theme before paint -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('taskflow:theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- Offline indicator -->
  <div id="offline-banner" class="offline-banner" hidden role="status" aria-live="polite">
    You're offline — changes will be saved locally.
  </div>

  <!-- App root -->
  <div id="app" class="app">
    <header id="app-header" class="app-header"></header>

    <main id="main" class="app-main" tabindex="-1">
      <section id="search-section" class="search-section"></section>
      <section id="filter-section" class="filter-section"></section>
      <section id="list-section" class="list-section" aria-live="polite"></section>
    </main>

    <!-- Floating Action Button -->
    <button
      id="fab-add"
      class="fab"
      type="button"
      aria-label="Add new task"
      title="Add new task (N)"
    >
      <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>

    <!-- Modal mount point -->
    <div id="modal-root"></div>

    <!-- Toast mount point -->
    <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="false"></div>

    <!-- Install banner mount point -->
    <div id="install-root"></div>
  </div>

  <!-- App entry (ES module) -->
  <script type="module" src="src/app.js"></script>
</body>
</html>
